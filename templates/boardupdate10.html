<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시글 수정</title>

    <link href="../static/css/bootstrap.css" rel="stylesheet" />
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        .book-info-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            border-bottom: 1px solid #ccc;
            padding-bottom: 15px;
        }

        .book-image {
            flex: 1 1 30%;
        }

        .book-image img {
            width: 100%;
            height: auto;
            border-radius: 5px;
        }

        .book-details {
            flex: 1 1 65%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .book-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .boardwhite10_container {
            width: 100%;
            max-width: 800px;
            padding: 15px;
            margin: 0 auto;
        }

        .form-group {
            margin-top: 20px;
        }

        .form-group label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        .form-group textarea {
            width: 100%;
            height: 150px;
            font-size: 1rem;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            resize: none;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            padding-bottom: 60px; /* 네비게이션 바 높이만큼 추가 */
            box-sizing: border-box;
        }
    
        .book-info-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            border-bottom: 1px solid #ccc;
            padding-bottom: 15px;
        }
    
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px; /* 고정 높이 */
            background-color: #f8f9fa; /* 밝은 배경 */
            display: flex;
            justify-content: space-around; /* 버튼 간격 균등 */
            align-items: center;
            border-top: 1px solid #ddd; /* 상단 테두리 */
            box-shadow: 0 -1px 5px rgba(0, 0, 0, 0.1); /* 그림자 */
            box-sizing: border-box;
        }
    
        .nav-button {
            padding: 10px 20px;
            font-size: 1rem;
            color: white;
            text-decoration: none;
            background-color: #007bff;
            border: 1px solid #007bff;
            border-radius: 5px;
            transition: all 0.3s ease;
            text-align: center;
            flex: 1; /* 버튼 크기 균등 */
            margin: 0 5px; /* 버튼 간격 */
            text-align: center;
        }
    
        .nav-button:hover {
            background-color: white;
            color: #007bff;
            cursor: pointer;
        }
    
        /* 작은 화면에서 동적 조정 */
        @media (max-width: 768px) {
            .nav-bar {
                height: auto; /* 높이 자동 조정 */
                flex-wrap: wrap; /* 버튼 줄바꿈 허용 */
            }
    
            .nav-button {
                flex: none; /* 버튼 크기 균등 해제 */
                width: 45%; /* 버튼 너비 설정 */
                margin: 5px; /* 버튼 간격 */
            }
        }
    </style>
</head>

<body>
    <!-- 상단 책 정보 섹션 -->
    <div class="book-info-container">
        <div class="book-image">
            <img src="{{ record.image if record.image else '../static/imgfile/noimage.png' }}" alt="책 표지">
        </div>
        <div class="book-details">
            <div class="book-title">{{ record.title }}</div>
            <div>
                <div>저자: {{ record.author }}</div>
                <div>출판사: {{ record.publisher }}</div>
                <div>ISBN: {{ record.isbn }}</div>
                <div>작성일: {{ record.visit_date }}</div>
            </div>
        </div>
    </div>

    <!-- 수정 영역 -->
    <div class="boardwhite10_container">
        <input type="hidden" id="record_id" value="{{ record.record_id }}" />
        <form id="editForm">
            <div class="form-group">
                <label for="highlight">인상 깊은 문구</label>
                <textarea id="highlight" required>{{ record.highlight }}</textarea>
            </div>

            <div class="form-group">
                <label for="memo">메모</label>
                <textarea id="memo">{{ record.memo }}</textarea>
            </div>

            <div class="nav-bar">
                <a href="#" class="nav-button" onclick=goToContentPage()>취소</a>
                <button type="submit" class="nav-button">저장</button>
            </div>
        </form>
    </div>

    <script>
        function goToContentPage() {
            recordId = document.getElementById("record_id").value;
            if (recordId) {
                window.location.href = `/boardcontent10?record_id=${recordId}`; // user_id를 URL 매개변수로 추가
            } else {
                 alert("로그인이 필요합니다.");
            }
        }
    </script>


    <script>
        document.getElementById("editForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            
            const recordId = {{ record.record_id }};
            const highlight = document.getElementById("highlight").value.trim();
            const memo = document.getElementById("memo").value.trim();

            try {
                const response = await fetch(`/update_record/${recordId}`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({ highlight, memo }),
                });

                if (response.ok) {
                    alert("수정이 완료되었습니다.");
                    window.location.href = `/boardcontent10?record_id=${recordId}`;
                } else {
                    alert("수정에 실패했습니다. 다시 시도해주세요.");
                }
            } catch (error) {
                console.error("Error updating record:", error);
                alert("서버와 통신 중 오류가 발생했습니다.");
            }
        });
    </script>
</body>

</html>
