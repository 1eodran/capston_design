<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>책 검색</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.1.3/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center">책 검색</h1>
        <form id="searchForm" class="my-4">
            <div class="mb-3">
                <label for="keyword" class="form-label">검색어</label>
                <input type="text" class="form-control" id="keyword" placeholder="책 제목 또는 키워드 입력" required>
            </div>
            <div class="mb-3">
                <label for="library" class="form-label">도서관</label>
                <select class="form-select" id="library" required>
                    <option value="" disabled selected>도서관을 선택해주세요</option>
                    <option value="창원중앙도서관">창원중앙도서관</option>
                    <option value="마산내서도서관">마산내서도서관</option>
                    <option value="진해도서관">진해도서관</option>
                    <option value="동부도서관">동부도서관</option>
                    <option value="고향의봄도서관">고향의봄도서관</option>
                    <option value="명곡도서관">명곡도서관</option>
                    <option value="성산도서관">성산도서관</option>
                    <option value="상남도서관">상남도서관</option>
                    <option value="마산합포도서관">마산합포도서관</option>
                    <option value="마산회원도서관">마산회원도서관</option>
                    <option value="마산중리초등복합시설도서관">마산중리초등복합시설도서관</option>
                    <option value="진해기적의도서관">진해기적의도서관</option>
                    <option value="최윤덕도서관">최윤덕도서관</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">검색</button>
        </form>

        <div id="results" class="mt-5">
            <!-- 검색 결과가 표시됩니다 -->
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script>
        $(document).ready(function() {
            $('#searchForm').on('submit', function(e) {
                e.preventDefault();

                const keyword = $('#keyword').val().trim();
                const library = $('#library').val();

                if (!keyword || !library) {
                    alert('검색어와 도서관을 모두 입력해주세요.');
                    return;
                }

                // AJAX 요청으로 검색 결과 가져오기
                $.ajax({
                    url: '/search-books',
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ keyword, library }),
                    success: function(response) {
                        $('#results').html(response.results_html);
                    },
                    error: function(xhr) {
                        const error = xhr.responseJSON.error || '알 수 없는 오류가 발생했습니다.';
                        $('#results').html(`<div class="alert alert-danger">${error}</div>`);
                    }
                });
            });
        });
    </script>
</body>
</html>
