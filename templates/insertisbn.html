<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISBN 입력</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f9f9f9;
        }

        .container {
            width: 90%; /* 화면 너비의 90% */
            max-width: 400px; /* 최대 너비 설정 */
            padding: 20px;
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px; /* 요소 간의 간격 */
        }

        label {
            font-size: 1rem;
            text-align: left;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            padding: 10px;
            font-size: 1rem;
            color: #ffffff;
            background-color: #007bff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        /* 반응형 스타일 */
        @media (max-width: 576px) {
            h1 {
                font-size: 1.25rem;
            }

            input[type="text"], button {
                font-size: 0.9rem;
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ISBN 입력</h1>

        <!-- 에러 메시지를 팝업으로 표시 -->
        {% if error %}
        <script>
            alert("{{ error }}");
        </script>
        {% endif %}

        <form action="/submit-isbn" method="post">
            <label for="isbn">ISBN 코드:</label>
            <input type="text" id="isbn" name="isbn" value="{{ isbn if isbn else '' }}" required>
            <button type="submit">제출</button>
        </form>
    </div>
</body>
</html>
