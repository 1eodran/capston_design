<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바코드 스캔</title>
    <link rel="stylesheet" href="../static/css/barcode.css">
    <link rel="stylesheet" href="../static/css/bootstrap.css">
</head>
<body>
    <div id="camera-container">
        <video id="camera" autoplay playsinline></video>
        <div id="overlay">
            <div class="left"></div>
            <div class="right"></div>
        </div>
        <div id="barcode-area"></div>
        <p id="result">스캔 결과: 없음</p>
    </div>
    <div id="button-container">
        <button id="scan-button" class="button">스캔</button>
        <button id="insert-button" class="button" onclick="goToInsertisbn()">입력</button>
    </div>

    <script>
        async function startCamera() {
            const video = document.getElementById('camera');
            const resultElement = document.getElementById('result');

            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                alert("카메라를 지원하지 않는 브라우저입니다.");
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' } // 후면 카메라
                });
                video.srcObject = stream;

                document.getElementById('scan-button').addEventListener('click', async () => {
                    const barcodeArea = document.getElementById('barcode-area');
                    const barcodeRect = barcodeArea.getBoundingClientRect();
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');

                    // 비디오 해상도를 기준으로 스케일 계산
                    const scaleX = video.videoWidth / video.offsetWidth;
                    const scaleY = video.videoHeight / video.offsetHeight;

                    const x = Math.round((barcodeRect.x - video.offsetLeft) * scaleX);
                    const y = Math.round((barcodeRect.y - video.offsetTop) * scaleY);
                    const width = Math.round(barcodeRect.width * scaleX);
                    const height = Math.round(barcodeRect.height * scaleY);

                    canvas.width = width;
                    canvas.height = height;

                    // 캔버스에 바코드 영역 복사
                    ctx.drawImage(video, x, y, width, height, 0, 0, width, height);
                    const imageData = canvas.toDataURL('image/png');

                    // 캡쳐된 이미지를 서버로 전송
                    try {
                        const response = await fetch('/scan-barcode', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ image: imageData })
                        });

                        const data = await response.json();

                        if (data.book_info) {
                            resultElement.textContent = `ISBN: ${data.book_info.isbn}`;
                        } else {
                            resultElement.textContent = 'ISBN 인식 실패';
                        }
                    } catch (error) {
                        console.error('바코드 인식 오류:', error);
                    }
                });
            } catch (error) {
                console.error("카메라 접근 오류:", error);
                alert("카메라 접근 실패: " + error.message);
            }
        }

        document.getElementById('scan-button').addEventListener('click', startCamera);

        function goToInsertisbn() {
            window.location.href = "/insertisbn";
        }
    </script>
</body>
</html>
